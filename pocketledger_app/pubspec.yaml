name: pocketledger
description: "Envelope-based budget tracker with giant numpad for 3-second transaction entry."
publish_to: 'none'

version: 1.0.2+2

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  provider: ^6.1.4
  intl: ^0.20.2
  image_picker: ^1.1.2
  image: ^4.3.0
  share_plus: ^10.1.4
  file_picker: ^8.3.7
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  in_app_purchase: ^3.2.0
  shared_preferences: ^2.3.4
  flex_color_picker: ^3.6.1
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#059669"
  image: "assets/icon/app_icon.png"
  android: true
  ios: true
